# 方式 B：Postgres + Redis 依赖（Scheme 2，实验/未验证）
#   docker compose -f docker-compose.postgres-redis.yml up -d
#
# 只拉起 Postgres/Redis，不包含 gateway/worker 完整编排。
# 应用进程请本机 make build-scheme2 后手动启动。
# 注意：该路径尚未完成联调验证，生产请优先 docker-compose.sqlite.yml。

services:
  postgres:
    image: postgres:16-alpine
    container_name: grokbuild-postgres
    environment:
      POSTGRES_USER: gbp
      POSTGRES_PASSWORD: gbp
      POSTGRES_DB: grokbuild_pool
    ports:
      - "5432:5432"
    volumes:
      - scheme2-pg:/var/lib/postgresql/data
      - ./migrations/postgres/001_scheme2_init.sql:/docker-entrypoint-initdb.d/001_scheme2_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gbp -d grokbuild_pool"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: grokbuild-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  scheme2-pg:
